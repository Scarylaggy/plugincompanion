name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          #- platform: windows-latest
          #  target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libegl1 \
            libglib2.0-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libatk-bridge2.0-dev \
            libxcomposite-dev \
            libxdamage-dev \
            libxfixes-dev \
            libxrandr-dev \
            libxkbcommon-dev \
            libgbm-dev \
            libasound2-dev
        env:
          DEBIAN_FRONTEND: noninteractive

      # We use the official action here which handles the bundling logic better
      - name: Build and Bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # These fixed your local build on Arch, so we bake them in here too
          APPIMAGE_EXTRACT_AND_RUN: 1
          NO_STRIP: 1
          # Critical for AMD/Arch compatibility
          EXTRA_LIB_EXCLUDES: "libEGL*;libGLES*;libgbm*;libdrm*;libglapi*;libGLX*;libglx*;libGLdispatch*;libGLX_mesa*"
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "LOTRO Plugin Companion v__VERSION__"
          releaseBody: "Automated release from GitHub Actions."
          releaseDraft: false
          prerelease: false
          # This will only create a release if a tag was pushed
          includeRelease: ${{ startsWith(github.ref, 'refs/tags/v') }}